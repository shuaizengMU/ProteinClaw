name: Release

# Triggered by pushing a version tag, e.g. git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest       # Apple Silicon runner
            target: aarch64-apple-darwin
            asset_name: proteinclaw-tui-macos-arm64

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_name: proteinclaw-tui-linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: proteinclaw-tui-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cargo build --release -p cli-tui --target ${{ matrix.target }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release -p cli-tui --target ${{ matrix.target }}

      # Rename binary to match asset_name expected by install scripts
      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/proteinclaw-tui ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/proteinclaw-tui.exe ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          name: ProteinClaw ${{ github.ref_name }}
          body: |
            ## Install

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/shuaizengMU/ProteinClaw/main/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/shuaizengMU/ProteinClaw/main/install.ps1 | iex
            ```

            ## Manual download

            Pick the binary for your platform from the assets below.

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `proteinclaw-tui-macos-arm64` |
            | Linux (x86_64) | `proteinclaw-tui-linux-x86_64` |
            | Windows (x86_64) | `proteinclaw-tui-windows-x86_64.exe` |

          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v1.0.0-beta → prerelease
